# go-orca.yaml — example configuration for go-orca-api
# Copy this file to your working directory and edit as needed.
# All values can be overridden via GOORCA_* environment variables
# (e.g. GOORCA_DATABASE_DSN, GOORCA_PROVIDERS_OPENAI_API_KEY).

# ─── HTTP server ───────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"          # debug | release | test
  read_timeout: "30s"
  write_timeout: "60s"
  shutdown_timeout: "15s"
  trusted_proxies: []

# ─── Database ─────────────────────────────────────────────────────────────────
database:
  # driver: "sqlite"       # Use SQLite for homelab / local development
  driver: "postgres"       # Use Postgres for production
  dsn: "postgres://go-orca:go-orca@localhost:5432/go-orca?sslmode=disable"
  # dsn: "go-orca.db"      # SQLite file path
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
  migrations_path: "internal/storage/migrations"
  auto_migrate: true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | console

# ─── Scoping ──────────────────────────────────────────────────────────────────
scoping:
  mode: "global"           # global | org | team | hosted
  allow_global: true
  allow_org: false
  allow_team: false
  require_team_parent_org: true
  default_tenant: "default"
  default_scope: "global"

# ─── Providers ────────────────────────────────────────────────────────────────
providers:
  openai:
    enabled: false
    api_key: ""            # or set GOORCA_PROVIDERS_OPENAI_API_KEY
    base_url: ""           # leave empty for api.openai.com
    default_model: "gpt-4o"
    timeout: "120s"

  ollama:
    enabled: false
    host: "http://localhost:11434"
    default_model: "llama3"
    timeout: "120s"

  copilot:
    enabled: false
    github_token: ""       # or set GOORCA_PROVIDERS_COPILOT_GITHUB_TOKEN
    cli_path: ""           # path to `gh` CLI binary; leave empty for PATH lookup
    default_model: "gpt-4o"

# ─── Customization sources ────────────────────────────────────────────────────
# Each source is scanned for SKILL.md, .agent.md, and .prompt.md files.
# Higher precedence wins when the same name exists in multiple sources.
customizations:
  sources:
    # Skill packages shipped with the repo.
    - name: "built-in-skills"
      type: "filesystem"
      root: "./skills"
      precedence: 20
      enabled_types:
        - "skill"

    # Per-persona agent overlays.
    - name: "agent-overlays"
      type: "filesystem"
      root: "./customization/agents"
      precedence: 10
      enabled_types:
        - "agent"

    # Uncomment to load organisation or team-specific overrides:
    # - name: "org-customizations"
    #   type: "filesystem"
    #   root: "./customizations"
    #   precedence: 5
    #   enabled_types:
    #     - "skill"
    #     - "prompt"
    #   scope_slug: "global"

# ─── Workflow engine ──────────────────────────────────────────────────────────
workflow:
  max_concurrent_workflows: 10
  max_concurrent_tasks: 50
  default_persona_timeout_ms: 120000
  event_retention_days: 90
  artifact_storage_path: "./artifacts"
  handoff_timeout: "5m"
