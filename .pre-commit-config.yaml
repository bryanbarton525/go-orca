repos:
  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]   # allow custom YAML tags (e.g. Helm)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Go ─────────────────────────────────────────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'go vet $(go list ./... | grep -v /artifacts/)'
        files: \.go$
        pass_filenames: false
      - id: go-mod-tidy
        name: go mod tidy
        language: system
        entry: go mod tidy
        files: ^go\.(mod|sum)$
        pass_filenames: false

  # ── UI (Next.js) ───────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: ui-lint
        name: pnpm lint (ui)
        language: system
        entry: bash -c 'cd ui && pnpm lint'
        files: ^ui/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false
      - id: ui-typecheck
        name: pnpm typecheck (ui)
        language: system
        entry: bash -c 'cd ui && pnpm typecheck'
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false
