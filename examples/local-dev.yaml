# examples/local-dev.yaml
#
# Fully local development setup — no API keys required.
# Uses SQLite for storage and Ollama for LLM inference.
#
# Prerequisites:
#   - Ollama running on localhost:11434 (https://ollama.com)
#   - Model pulled: ollama pull llama3
#
# Run:
#   ./go-orca-api -config examples/local-dev.yaml

# ─── HTTP server ───────────────────────────────────────────────────────────────
server:
  host: "127.0.0.1"        # localhost only; no external exposure
  port: 8080
  mode: "debug"            # verbose Gin logging
  read_timeout: "30s"
  write_timeout: "120s"    # governs non-SSE responses; SSE streams manage their own deadline via ?timeout
  shutdown_timeout: "10s"
  trusted_proxies: []

# ─── Database ─────────────────────────────────────────────────────────────────
database:
  driver: "sqlite"
  dsn: "go-orca-dev.db"    # created in the working directory
  max_open_conns: 5
  max_idle_conns: 2
  conn_max_lifetime: "5m"
  auto_migrate: true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "debug"           # verbose output during development
  format: "console"        # human-readable; switch to json for log parsing

# ─── Scoping ──────────────────────────────────────────────────────────────────
scoping:
  mode: "global"
  allow_global: true
  allow_org: false
  allow_team: false
  require_team_parent_org: true
  default_tenant: "default"
  default_scope: "global"

# ─── Providers ────────────────────────────────────────────────────────────────
providers:
  openai:
    enabled: false

  ollama:
    enabled: true
    host: "https://ollama.barton.local"
    default_model: "gemma4:e4b"
    timeout: "600s"        # local models can be slow; QA receives large artifact context
    tls_skip_verify: true  # homelab CA not trusted on this machine
    num_ctx: 32768         # explicit context window — default (2048-4096) causes mid-content truncation on synthesis tasks

  copilot:
    enabled: false

  anthropic:
    enabled: false
    # api_key: "sk-ant-..."       # or set GOORCA_PROVIDERS_ANTHROPIC_API_KEY
    default_model: "claude-sonnet-4-5"
    max_tokens: 16384
    timeout: "120s"

# ─── Tools ────────────────────────────────────────────────────────────────────
tools:
  mcp:
    # Context7: up-to-date library documentation via MCP.
    # Requires Node.js / npx. No API key needed for public docs.
    - name: context7
      transport: command
      command: npx
      args: ["-y", "@upstash/context7-mcp"]

# ─── Customizations ───────────────────────────────────────────────────────────
customizations:
  sources:
    # Skill packages — enable built-in skills shipped with the repo.
    - name: "built-in-skills"
      type: "filesystem"
      root: "./skills"
      precedence: 20
      enabled_types:
        - "skill"

    # Agent overlays — persona-specific instructions and active-skill declarations.
    - name: "agent-overlays"
      type: "filesystem"
      root: "./customization/agents"
      precedence: 10
      enabled_types:
        - "agent"

    # Uncomment to load additional skills from a local customization directory:
    # - name: "local-customizations"
    #   type: "filesystem"
    #   root: "./customizations"
    #   precedence: 5
    #   enabled_types:
    #     - "skill"
    #     - "prompt"
    #   scope_slug: "global"

# ─── Workflow engine ──────────────────────────────────────────────────────────
workflow:
  max_concurrent_workflows: 2   # low concurrency for a dev laptop
  max_concurrent_tasks: 10
  default_persona_timeout_ms: 180000   # 3 min — local models are slower
  event_retention_days: 30
  artifact_storage_path: "./artifacts"
  handoff_timeout: "10m"
  # Retry persona LLM calls on transient failures (deadline exceeded, connection
  # errors).  Each retry waits persona_retry_backoff * 2^(attempt-1) before
  # trying again.  Set persona_max_retries: 0 to disable.
  persona_max_retries: 3       # 3 extra attempts = 4 total
  persona_retry_backoff: "15s" # local Ollama can be slow; use a generous backoff
