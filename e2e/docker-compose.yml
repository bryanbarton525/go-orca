# docker-compose file used exclusively in CI for e2e tests.
# Spins up the API with SQLite (no external postgres required) and the UI.
services:
  api:
    image: ghcr.io/bryanbarton525/go-orca-api:latest
    ports:
      - "8080:8080"
    environment:
      GOORCA_CONFIG: /etc/go-orca/config.yaml
    volumes:
      - ./api-config.yaml:/etc/go-orca/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/orca/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ui:
    image: ghcr.io/bryanbarton525/go-orca-ui:latest
    ports:
      - "3000:3000"
    environment:
      GO_ORCA_API_BASE_URL: http://api:8080
      NEXTAUTH_SECRET: e2e-test-secret-must-be-32-chars-min
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
