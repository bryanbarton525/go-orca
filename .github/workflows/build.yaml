name: Build & Push go-orca

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "deploy/docker/**"
      - "skills/**"
      - "customization/**"
      - "prompts/**"
      - "ui/**"
      - "e2e/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bryanbarton525/go-orca-api

jobs:
  # ── Go unit tests ────────────────────────────────────────────────────────────
  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  # ── UI lint / typecheck / unit tests ────────────────────────────────────────
  test-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  # ── Build & push API image ───────────────────────────────────────────────────
  build-push:
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push first-party MCP server images ──────────────────────────────
  # Each first-party MCP server in cmd/mcp-* has its own Dockerfile under
  # deploy/docker/.  The matrix builds and pushes one image per server with
  # the same sha-/latest tags as the API image so registry entries can pin
  # to a release version.
  build-push-mcp:
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        server:
          - name: mcp-go-toolchain
            image: bryanbarton525/mcp-go-toolchain
            dockerfile: deploy/docker/mcp-go-toolchain.Dockerfile
          - name: mcp-node-toolchain
            image: bryanbarton525/mcp-node-toolchain
            dockerfile: deploy/docker/mcp-node-toolchain.Dockerfile
          - name: mcp-nextjs-toolchain
            image: bryanbarton525/mcp-nextjs-toolchain
            dockerfile: deploy/docker/mcp-nextjs-toolchain.Dockerfile
          - name: mcp-python-toolchain
            image: bryanbarton525/mcp-python-toolchain
            dockerfile: deploy/docker/mcp-python-toolchain.Dockerfile
          - name: mcp-rust-toolchain
            image: bryanbarton525/mcp-rust-toolchain
            dockerfile: deploy/docker/mcp-rust-toolchain.Dockerfile
          - name: mcp-java-toolchain
            image: bryanbarton525/mcp-java-toolchain
            dockerfile: deploy/docker/mcp-java-toolchain.Dockerfile
          - name: mcp-git
            image: bryanbarton525/mcp-git
            dockerfile: deploy/docker/mcp-git.Dockerfile
          - name: mcp-filesystem
            image: bryanbarton525/mcp-filesystem
            dockerfile: deploy/docker/mcp-filesystem.Dockerfile
          - name: mcp-workspace
            image: bryanbarton525/mcp-workspace
            dockerfile: deploy/docker/mcp-workspace.Dockerfile
          - name: mcp-container-build
            image: bryanbarton525/mcp-container-build
            dockerfile: deploy/docker/mcp-container-build.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.server.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.server.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.server.name }}
          cache-to: type=gha,scope=${{ matrix.server.name }},mode=max

  # ── Build & push UI image ────────────────────────────────────────────────────
  build-push-ui:
    needs: [test-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bryanbarton525/molokini
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── E2e tests ────────────────────────────────────────────────────────────────
  e2e:
    needs: [build-push, build-push-ui]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ghcr.io/bryanbarton525/go-orca-api:latest
          docker pull ghcr.io/bryanbarton525/molokini:latest

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c '
            until docker compose ps | grep -E "api.*healthy" && docker compose ps | grep -E "ui.*healthy"; do
              echo "Waiting for services..."
              sleep 3
            done
          '

      - name: Run e2e tests
        run: pnpm test
        env:
          API_BASE_URL: http://localhost:8080
          UI_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
